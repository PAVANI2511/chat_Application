<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat App - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-comments"></i> RealTime<span>Chat</span>
            </a>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <a href="register.html" class="btn btn-secondary">Register</a>
            </div>
        </div>
    </header>

    <main class="form-section">
        <div class="form-card">
            <div class="form-header">
                <h1 class="form-title">Welcome Back</h1>
                <p class="form-desc">Sign in to continue your conversations</p>
            </div>

            <form id="login-form">
                <!-- Username -->
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="rahul" required autocomplete="username">
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 15px; margin-top: 10px;">
                    Sign In
                </button>
            </form>

            <div class="form-footer">
                Don't have an account? <a href="register.html">Register Now</a>
            </div>
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="script.js"></script>
    <script>
        // Set up the local pages theme toggler
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon(currentTheme);

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let newTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'fa-solid fa-sun';
            } else {
                themeIcon.className = 'fa-solid fa-moon';
            }
        }
    </script>
</body>
</html>
